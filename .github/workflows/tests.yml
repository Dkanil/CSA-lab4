name: tests

on:
  push:
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-golden ruff mypy

      - name: Check code formatting (Ruff Formatter)
        run: ruff format --check .

      - name: Run Linter (Ruff)
        run: ruff check .

      - name: Run Type Checker (Mypy)
        run: mypy . --strict

      - name: Run Tests
        run: pytest . -v