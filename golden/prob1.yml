out_ast: |-
  var(line=1, name='max_pal', type_name='num')
  var(line=2, name='i', type_name='num')
  var(line=3, name='j', type_name='num')
  var(line=4, name='prod', type_name='num')
  var(line=5, name='temp', type_name='num')
  var(line=6, name='rev', type_name='num')
  var(line=7, name='rem', type_name='num')
  set(line=9, name='max_pal', expr='0')
    expr: Literal(value=0)
  set(line=10, name='i', expr='999')
    expr: Literal(value=999)
  while(line=12, condition='i >= 100')
    condition_op: '>='
    left: Identifier(name='i')
    right: Literal(value=100)
  set(line=13, name='j', expr='i')
    expr: Identifier(name='i')
  while(line=14, condition='j >= 100')
    condition_op: '>='
    left: Identifier(name='j')
    right: Literal(value=100)
  set(line=15, name='prod', expr='i * j')
    expr: BinaryExpr(op='*')
    left: Identifier(name='i')
    right: Identifier(name='j')
  if(line=16, condition='prod <= max_pal')
    condition_op: '<='
    left: Identifier(name='prod')
    right: Identifier(name='max_pal')
  set(line=17, name='j', expr='0')
    expr: Literal(value=0)
  else(line=18)
  set(line=19, name='temp', expr='prod')
    expr: Identifier(name='prod')
  set(line=20, name='rev', expr='0')
    expr: Literal(value=0)
  while(line=21, condition='temp > 0')
    condition_op: '>'
    left: Identifier(name='temp')
    right: Literal(value=0)
  set(line=22, name='rem', expr='temp % 10')
    expr: BinaryExpr(op='%')
    left: Identifier(name='temp')
    right: Literal(value=10)
  set(line=23, name='rev', expr='rev * 10')
    expr: BinaryExpr(op='*')
    left: Identifier(name='rev')
    right: Literal(value=10)
  set(line=24, name='rev', expr='rev + rem')
    expr: BinaryExpr(op='+')
    left: Identifier(name='rev')
    right: Identifier(name='rem')
  set(line=25, name='temp', expr='temp // 10')
    expr: BinaryExpr(op='//')
    left: Identifier(name='temp')
    right: Literal(value=10)
  end(line=26)
  if(line=27, condition='rev == prod')
    condition_op: '=='
    left: Identifier(name='rev')
    right: Identifier(name='prod')
  set(line=28, name='max_pal', expr='prod')
    expr: Identifier(name='prod')
  end(line=29)
  end(line=30)
  set(line=31, name='j', expr='j - 1')
    expr: BinaryExpr(op='-')
    left: Identifier(name='j')
    right: Literal(value=1)
  end(line=32)
  set(line=33, name='i', expr='i - 1')
    expr: BinaryExpr(op='-')
    left: Identifier(name='i')
    right: Literal(value=1)
  end(line=34)
  print(line=36, expr='max_pal')
    expr: Identifier(name='max_pal')
