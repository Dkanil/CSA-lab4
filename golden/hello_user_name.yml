out_ast: |-
  pstr(line=1, name='ask', value='What is your name?\n')
  pstr(line=2, name='hello', value='Hello, ')
  pstr(line=3, name='end', value='!')
  var(line=4, name='name', type_name='pstr')
  print(line=6, expr='ask')
    expr: Identifier(name='ask')
  input(line=7, name='name')
  print(line=8, expr='hello')
    expr: Identifier(name='hello')
  print(line=9, expr='name')
    expr: Identifier(name='name')
  print(line=10, expr='end')
    expr: Identifier(name='end')
