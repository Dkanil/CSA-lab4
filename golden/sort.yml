out_ast: |-
  var(line=1, name='count', type_name='num')
  var(line=2, name='i', type_name='num')
  var(line=3, name='j', type_name='num')
  var(line=4, name='limit', type_name='num')
  var(line=5, name='t', type_name='num')
  var(line=6, name='a', type_name='num[]')
  input(line=8, name='count')
  if(line=9, condition='count > 32')
    condition_op: '>'
    left: Identifier(name='count')
    right: Literal(value=32)
  set(line=10, name='count', expr='32')
    expr: Literal(value=32)
  end(line=11)
  set(line=13, name='i', expr='0')
    expr: Literal(value=0)
  while(line=14, condition='i < count')
    condition_op: '<'
    left: Identifier(name='i')
    right: Identifier(name='count')
  input(line=15, name='a[i]')
    target: IndexAccess(name='a')
    index: Identifier(name='i')
  set(line=16, name='i', expr='i + 1')
    expr: BinaryExpr(op='+')
    left: Identifier(name='i')
    right: Literal(value=1)
  end(line=17)
  set(line=19, name='i', expr='0')
    expr: Literal(value=0)
  while(line=20, condition='i < count')
    condition_op: '<'
    left: Identifier(name='i')
    right: Identifier(name='count')
  set(line=21, name='limit', expr='count - i')
    expr: BinaryExpr(op='-')
    left: Identifier(name='count')
    right: Identifier(name='i')
  set(line=22, name='limit', expr='limit - 1')
    expr: BinaryExpr(op='-')
    left: Identifier(name='limit')
    right: Literal(value=1)
  set(line=23, name='j', expr='0')
    expr: Literal(value=0)
  while(line=24, condition='j < limit')
    condition_op: '<'
    left: Identifier(name='j')
    right: Identifier(name='limit')
  if(line=25, condition='a[j] > a[j + 1]')
    condition_op: '>'
    left: IndexAccess(name='a')
    index: Identifier(name='j')
    right: IndexAccess(name='a')
    index: BinaryExpr(op='+')
      left: Identifier(name='j')
      right: Literal(value=1)
  set(line=26, name='t', expr='a[j]')
    expr: IndexAccess(name='a')
    index: Identifier(name='j')
  set(line=27, name='a[j]', expr='a[j + 1]')
    target: IndexAccess(name='a')
    index: Identifier(name='j')
    expr: IndexAccess(name='a')
    index: BinaryExpr(op='+')
      left: Identifier(name='j')
      right: Literal(value=1)
  set(line=28, name='a[j + 1]', expr='t')
    target: IndexAccess(name='a')
    index: BinaryExpr(op='+')
      left: Identifier(name='j')
      right: Literal(value=1)
    expr: Identifier(name='t')
  end(line=29)
  set(line=30, name='j', expr='j + 1')
    expr: BinaryExpr(op='+')
    left: Identifier(name='j')
    right: Literal(value=1)
  end(line=31)
  set(line=32, name='i', expr='i + 1')
    expr: BinaryExpr(op='+')
    left: Identifier(name='i')
    right: Literal(value=1)
  end(line=33)
  set(line=35, name='i', expr='0')
    expr: Literal(value=0)
  while(line=36, condition='i < count')
    condition_op: '<'
    left: Identifier(name='i')
    right: Identifier(name='count')
  print(line=37, expr='a[i]')
    expr: IndexAccess(name='a')
    index: Identifier(name='i')
  set(line=38, name='i', expr='i + 1')
    expr: BinaryExpr(op='+')
    left: Identifier(name='i')
    right: Literal(value=1)
  end(line=39)
