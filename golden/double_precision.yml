out_ast: |-
  var(line=1, name='low1', type_name='num')
  var(line=2, name='high1', type_name='num')
  var(line=3, name='low2', type_name='num')
  var(line=4, name='high2', type_name='num')
  var(line=5, name='low_res', type_name='num')
  var(line=6, name='high_res', type_name='num')
  var(line=7, name='carry', type_name='num')
  set(line=8, name='high1', expr='1')
    expr: Literal(value=1)
  set(line=9, name='low1', expr='0 - 1')
    expr: BinaryExpr(op='-')
    left: Literal(value=0)
    right: Literal(value=1)
  set(line=10, name='high2', expr='2')
    expr: Literal(value=2)
  set(line=11, name='low2', expr='2')
    expr: Literal(value=2)
  set(line=13, name='low_res', expr='low1 + low2')
    expr: BinaryExpr(op='+')
    left: Identifier(name='low1')
    right: Identifier(name='low2')
  set(line=14, name='carry', expr='0')
    expr: Literal(value=0)
  if(line=15, condition='low1 < 0')
    condition_op: '<'
    left: Identifier(name='low1')
    right: Literal(value=0)
  if(line=16, condition='low2 < 0')
    condition_op: '<'
    left: Identifier(name='low2')
    right: Literal(value=0)
  set(line=17, name='carry', expr='1')
    expr: Literal(value=1)
  else(line=18)
  if(line=19, condition='low_res >= 0')
    condition_op: '>='
    left: Identifier(name='low_res')
    right: Literal(value=0)
  set(line=20, name='carry', expr='1')
    expr: Literal(value=1)
  end(line=21)
  end(line=22)
  else(line=23)
  if(line=24, condition='low2 < 0')
    condition_op: '<'
    left: Identifier(name='low2')
    right: Literal(value=0)
  if(line=25, condition='low_res >= 0')
    condition_op: '>='
    left: Identifier(name='low_res')
    right: Literal(value=0)
  set(line=26, name='carry', expr='1')
    expr: Literal(value=1)
  end(line=27)
  end(line=28)
  end(line=29)
  set(line=30, name='high_res', expr='high1 + high2 + carry')
    expr: BinaryExpr(op='+')
    left: BinaryExpr(op='+')
      left: Identifier(name='high1')
      right: Identifier(name='high2')
    right: Identifier(name='carry')
  print(line=32, expr='high_res')
    expr: Identifier(name='high_res')
  print(line=33, expr='low_res')
    expr: Identifier(name='low_res')
