in_source: |-
  var num left
  var char ch

  input(left)
  while left > 0:
      input(ch)
      print(ch)
      set left = left - 1
  end
in_stdin:
- 5
- 104
- 101
- 108
- 108
- 111
in_limit: 100000
out_code: !!binary |
  AAAAAgAAABIAAAAAAAAAABAAAAATAAAQEAAAECgAAAA1AAAPEAAAABMAABEQAAAREwAAARAAABAj
  AAABEwAAEDAAAAT/AAAAAAAAAAAAAAA=
out_code_hex: |-
  # entry 2
  # code
  0002 - 10000000 - ld 0: ACC <- IN_PORT
  0003 - 13000010 - st 16: mem[16] <- ACC
  0004 - 10000010 - ld 16: ACC <- mem[16]
  0005 - 28000000 - cmpi 0: flags <- ACC - 0
  0006 - 3500000F - ble 15: if N or Z then PC <- 15
  0007 - 10000000 - ld 0: ACC <- IN_PORT
  0008 - 13000011 - st 17: mem[17] <- ACC
  0009 - 10000011 - ld 17: ACC <- mem[17]
  0010 - 13000001 - st 1: OUT_PORT <- ACC
  0011 - 10000010 - ld 16: ACC <- mem[16]
  0012 - 23000001 - subi 1: ACC <- ACC - 1
  0013 - 13000010 - st 16: mem[16] <- ACC
  0014 - 30000004 - jmp 4: PC <- 4
  0015 - FF000000 - hlt: halt
  # data
  0016 - 00000000 - 0
  0017 - 00000000 - 0
out_ast: |-
  var(line=1, name='left', type_name='num')
  var(line=2, name='ch', type_name='char')
  input(line=4, name='left')
  while(line=5, condition='left > 0')
    condition_op: '>'
    left: Identifier(name='left')
    right: Literal(value=0)
  input(line=6, name='ch')
  print(line=7, expr='ch')
    expr: Identifier(name='ch')
  set(line=8, name='left', expr='left - 1')
    expr: BinaryExpr(op='-')
    left: Identifier(name='left')
    right: Literal(value=1)
  end(line=9)
